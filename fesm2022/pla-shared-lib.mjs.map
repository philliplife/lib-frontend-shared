<!-- {{ appliedFilters?.[column.field]?.value }} -->
<p-columnFilter
  [field]="column.field"
  type="date"
  [showMenu]="false"
  [showOperator]="false"
  [showClearButton]="false"
  placeholder="Select Date"
  [matchMode]="'between'"
>
  <ng-template
    pTemplate="filter"
    let-dateValue
    let-filterCallback="filterCallback"
  >
    <div class="flex align-items-center gap-2">
      <p-datepicker
        [ngModel]="appliedFilters?.[column.field]?.value"
        (ngModelChange)="onDateChange($event, filterCallback)"
        [selectionMode]="'range'"
        dateFormat="dd/mm/yy"
        placeholder="Select start date - end date"
        appendTo="body"
        showClear="true"
      ></p-datepicker>
    </div>
  </ng-template>
</p-columnFilter>
