<p-columnFilter
  type="custom"
  [field]="column.field"
  matchMode="equals"
  [showMenu]="false"
  [showClearButton]="false"
  [matchModeOptions]="operatorOptions"
>
  <ng-template pTemplate="filter" let-value let-filterCallback="filterCallback">
    <!-- {{appliedFilters?.[header.searchField]?.value}} -->

    <p-multiselect
      (ngModelChange)="onSelectFilter($event, filterCallback)"
      [ngModel]="appliedFilters[column.searchField || '']?.value"
      [options]="column.options"
      optionLabel="name"
      optionValue="code"
      [placeholder]="`Select ${column.title}`"
      filter="true"
      (onFilter)="column?.searchFunction($event)"
      [loading]="column.loading"
      [appendTo]="'body'"
      styleClass="w-full"
      class="status-filter"
      panelStyleClass="filter-select custom-filter-input"
      [ngStyle]="{ 'min-width': column.filterWidth }"
    />
  </ng-template>
</p-columnFilter>
