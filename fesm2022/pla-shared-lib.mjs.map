<p-columnFilter
  type="custom"
  [field]="column.field"
  [showClearButton]="false"
  [matchModeOptions]="operatorOptions"
>
  <ng-template pTemplate="filter" let-value let-filterCallback="filterCallback">
    <p-iconfield>
      <input
        [value]="appliedFilters[column.field]?.value ?? ''"
        #inputRef
        type="text"
        pInputText
        [ngStyle]="{ 'min-width': column.minWidth }"
        (keydown.enter)="onTextFilterEnter($event, filterCallback)"
        (input)="onTextFilterChange($event, column.field, filterCallback)"
        [placeholder]="
          column.isHidePlaceholder ? 'Search' : 'Search by ' + column.title
        "
      />
      @if (inputRef.value) {
        <p-inputicon
          class="pi pi-times"
          (click)="clearFilter(inputRef, column.field, filterCallback)"
          style="cursor: pointer"
        />
      }</p-iconfield
  ></ng-template>
</p-columnFilter>
