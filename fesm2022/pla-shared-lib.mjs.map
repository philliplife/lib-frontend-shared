<p-dialog
  [modal]="true"
  [draggable]="false"
  [(visible)]="isVisible"
  [style]="{ width: '28.125rem', 'z-index': '100' }"
  (visibleChange)="onClickCancel(false)"
  appendTo="body"
  maskStyleClass="confirm-modal">
  <div class="modal-container">
    <div class="image-icon">
      <img class="custom-swal-icon" src="assets/svg/icon-bell.svg" alt="icon-bell">
      <!-- <svg-icon
        class="icon-primary"
        [src]="'assets/svg/icon-bell.svg'"
        [svgStyle]="{
          'height.rem': 3.75,
          'width.rem': 3.75,
        }">
      </svg-icon> -->
    </div>
    <h5 [id]="title" class="title">{{ title  }}</h5>
    <p [id]="description" class="description text-center mb-4">
      {{ description  }}
    </p>
    <div class="flex justify-content-center gap-2 w-full">
      <p-button
        id="button-cancel-confirm"
        class="btn-small"
        [label]="cancelText"
        severity="secondary"
        (click)="onClickCancel(true)" />
      <p-button
        id="button-submit-confirm"
        class="btn-small btn-primary-linear-gradient"
        [label]="saveText"
        (click)="onClickSubmit()" />
    </div>
  </div>
</p-dialog>
