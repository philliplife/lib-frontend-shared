<p-table
  #dt
  [rows]="tableConfig.rows"
  [value]="tableLoading ? skeletonTable : tableData"
  [totalRecords]="
    tableConfig.tableLazyLoadConfig.islazyLoad
      ? tableConfig.tableLazyLoadConfig.totalRecord
      : 0
  "
  [lazy]="tableConfig.tableLazyLoadConfig.islazyLoad"
  (onLazyLoad)="
    tableConfig.tableLazyLoadConfig.islazyLoad
      ? onChangeTableFilters($event)
      : null
  "
  [customSort]="true"
  [filters]="appliedFilters"
  (onFilter)="onChangeFilter($event)"
  (sortFunction)="customSort($event)"
  [paginator]="tableConfig.tablePaginatorConfig.isShowPagination"
  [rowsPerPageOptions]="paginatorConfig.rowsPerPageOptions"
  [showCurrentPageReport]="paginatorConfig.showCurrentPageReport"
  [paginatorDropdownAppendTo]="paginatorConfig.paginatorDropdownAppendTo"
  [currentPageReportTemplate]="paginatorConfig.currentPageReportTemplate"
  columnResizeMode="fit"
  [scrollable]="true"
  [resizableColumns]="true"
  [(first)]="tableConfig.first"
>
  <ng-template pTemplate="header">
    <tr pla-table-header [tableColumns]="tableColumns"></tr>
    <tr
      pla-table-filter
      [tableColumns]="tableColumns"
      [appliedFilters]="appliedFilters"
    ></tr>
  </ng-template>

  <ng-template pTemplate="body" let-rowData let-rowIndex="rowIndex">
    @if (!tableLoading) {
      <tr
        pla-table-body
        [tableColumns]="tableColumns"
        [rowData]="rowData"
        [rowIndex]="rowIndex"
      ></tr>
    }
  </ng-template>
</p-table>
