<div class="content-layout">
  <div class="header-content">
    <h4 class="m-0" [id]="title">{{ title }}</h4>
    <div class="col-auto">
      <p-splitbutton
        class="flex lg:hidden btn-primary-linear-gradient ml-auto"
        [label]="selectMenu?.label_key || '-'"
        [model]="splitButtonMenu"
      />
    </div>
  </div>
  <div class="content-container">
    <div class="hidden lg:flex menu-container col-12 lg:col-3">
      @for (menu of menuList; track $index) {
        <div
          [id]="menu.value"
          class="menu"
          [ngClass]="{ 'selected-menu': selectMenu?.value === menu.value }"
          (click)="onSelectMenu(menu)"
          (keyup.enter)="onSelectMenu(menu)"
          (keyup.space)="onSelectMenu(menu)"
          tabindex="0"
          role="button"
        >
          <span>{{ menu.label_key || "-" }}</span>
        </div>
      }
    </div>
    <div class="content col-12 lg:col">
      <ng-content></ng-content>
    </div>
  </div>
</div>
