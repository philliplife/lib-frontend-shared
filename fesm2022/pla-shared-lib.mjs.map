@for (column of tableColumns; track $index) {
  <th
    [id]="column.field"
    [ngStyle]="{
      'text-align': column.headerAlign,
      'min-width': column.minWidth,
      'max-width': column.maxWidth,
      'border-left': column.frozenColumn ? '1px solid #e2e8f0' : 'none',
      'border-right': column.frozenColumn ? '1px solid #e2e8f0' : 'none',
    }"
    [alignFrozen]="column.alignFrozen ? column.alignFrozen : 'right'"
    pFrozenColumn
    [frozen]="column.frozenColumn ? true : false"
  >
    @if (column.isDisplayFilter) {
      <!-- TODO: Filter Here -->
      @switch (column.filterType) {
        @case ("input-text") {
          <pla-table-filter-input-text
            [column]="column"
            [appliedFilters]="appliedFilters"
            [operatorOptions]="operatorOptions"
          />
        }
        @case ("multi-select") {
          <pla-table-filter-multi-select
            [column]="column"
            [appliedFilters]="appliedFilters"
            [operatorOptions]="operatorOptions"
          />
        }
        @case ("date") {
          <pla-table-filter-date
            [column]="column"
            [appliedFilters]="appliedFilters"
          />
        }
        @default {
          <pla-table-filter-input-text
            [column]="column"
            [appliedFilters]="appliedFilters"
            [operatorOptions]="operatorOptions"
          />
        }
      }
    }
  </th>
}
