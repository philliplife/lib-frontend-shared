<ng-container *ngIf="control.formControlName">
  <div [formGroup]="listFormGroup">
    <p-floatlabel variant="in">
      <p-iconfield
        [attr.iconPosition]="
          control.classIcon ? (control.iconPosition ?? 'left') : null
        "
      >
        <!-- Render icon on the LEFT -->
        @if (control.classIcon && (control.iconPosition ?? "left") === "left") {
          <p-inputIcon [class]="control.classIcon"></p-inputIcon>
        }
        <input
          pInputText
          [formControlName]="control.formControlName"
          class="w-full"
          [id]="control.formControlName"
          [name]="control.formControlName"
          [readonly]="control.readOnly"
          [maxlength]="control.max || 1000"
          [appOverlayText]="control.floatingSuffix || ''"
          [appCharCount]="control.appCharCount && control.max ? control.max : 0"
          [inputTypeCount]="'input'"
          [pKeyFilter]="control.keyFilter"
          (input)="control.onInput ? control.onInput($event, index) : ''"
          (onChange)="onHandle($event)"
          [ngClass]="
            classValidate(
              listFormGroup.controls[control.formControlName],
              submitted
            )
          "
        />

        <!--  (onChange)="control.onFormChangeText
                            ? control.onFormChangeText(
                                $event,
                                control,
                                listFormGroup.controls[control.formControlName]
                              )
                            : ''"  -->
        <!-- Render icon on the RIGHT -->
        @if (
          control.classIcon && (control.iconPosition ?? "left") === "right"
        ) {
          <p-inputIcon [class]="control.classIcon"></p-inputIcon>
        }
      </p-iconfield>
      <label [for]="control.formControlName"
        >{{ control.label
        }}<span *ngIf="isRequired(control.formControlName, listFormGroup)"
          >*</span
        ></label
      >
    </p-floatlabel>
  </div>
</ng-container>
